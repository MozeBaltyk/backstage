name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags-ignore:
      - "v*"
permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CONTEXT_DIR: vanilla

jobs:
  build-scan:
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        include:
          - name: backstage-backend
            dockerfile: Containerfile.backend
          - name: backstage-frontend
            dockerfile: Containerfile.frontend

    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3

      # Build image
      - name: Build ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT_DIR }}
          file: ${{ env.CONTEXT_DIR }}/${{ matrix.dockerfile }}
          load: true
          push: false
          tags: ${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Scan image
      - name: Scan ${{ matrix.name }}
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: ${{ matrix.name }}:${{ github.sha }}
          format: json
          output: trivy-${{ matrix.name }}.json
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0

      # Generate PR comment with scan results
      - name: Generate PR comment
        if: github.event_name == 'pull_request'
        run: |
          echo "## 🔐 Trivy Scan Results - ${{ matrix.name }}" > comment.md
          echo "" >> comment.md

          COUNT=$(jq '[.Results[].Vulnerabilities[]?] | length' trivy-${{ matrix.name }}.json)

          if [ "$COUNT" -eq 0 ]; then
            echo "✅ No HIGH or CRITICAL vulnerabilities found." >> comment.md
          else
            echo "❌ Found $COUNT HIGH/CRITICAL vulnerabilities:" >> comment.md
            echo "" >> comment.md
            jq -r '.Results[].Vulnerabilities[]? | 
              "- **\(.Severity)** \(.VulnerabilityID) - \(.PkgName) (\(.InstalledVersion))"' \
              trivy-${{ matrix.name }}.json >> comment.md
          fi

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: comment.md
          header: ${{ matrix.name }}

      # Failed if vulnerabilities are found - not really needed currently
      # - name: Enforce vulnerability policy
      #   uses: aquasecurity/trivy-action@master
      #   with:
      #     scan-type: "image"
      #     image-ref: ${{ matrix.name }}:${{ github.sha }}
      #     severity: HIGH,CRITICAL
      #     ignore-unfixed: true
      #     exit-code: 1
      #     skip-setup-trivy: true
