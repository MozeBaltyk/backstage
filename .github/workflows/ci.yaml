name: ci
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  security-events: write
  id-token: write   # required for SBOM attestation

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FRONTEND_IMAGE_NAME: backstage-frontend
  BACKEND_IMAGE_NAME: backstage-backend
  CONTEXT_DIR: vanilla
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:

  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Backend
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT_DIR }}
          file: Containerfile.backend
          push: false
          load: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT_DIR }}
          file: Containerfile.frontend
          push: false
          load: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan:
    runs-on: ubuntu-24.04
    needs: build

    steps:
      # Install Trivy CLI
      - uses: aquasecurity/trivy-action@0.34.1
        with:
          scan-type: fs
          scan-ref: .
        continue-on-error: true

      - name: Scan backend (JSON)
        run: |
          trivy image --format json \
            -o backend.json \
            --severity HIGH,CRITICAL \
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Scan frontend (JSON)
        run: |
          trivy image --format json \
            -o frontend.json \
            --severity HIGH,CRITICAL \
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Generate SBOM (CycloneDX)
        run: |
          trivy image --format cyclonedx \
            -o backend-sbom.json ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          trivy image --format cyclonedx \
            -o frontend-sbom.json ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      # 🔎 Compare PR vs main (only on PR)
      - name: Compare against main
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main
          git checkout origin/main

          docker build -t ${{ env.BACKEND_IMAGE }}:main -f Containerfile.backend ${{ env.CONTEXT_DIR }}
          docker build -t ${{ env.FRONTEND_IMAGE }}:main -f Containerfile.frontend ${{ env.CONTEXT_DIR }}

          trivy image --format json -o backend-main.json ${{ env.BACKEND_IMAGE }}:main
          trivy image --format json -o frontend-main.json ${{ env.FRONTEND_IMAGE }}:main

      # 📝 Create PR summary comment
      - name: Create vulnerability summary
        if: github.event_name == 'pull_request'
        run: |
          echo "## 🔐 Trivy Vulnerability Summary" > summary.md
          echo "" >> summary.md
          echo "### Backend" >> summary.md
          jq '.Results[].Vulnerabilities[] | select(.Severity=="HIGH" or .Severity=="CRITICAL") | "- \(.Severity) - \(.PkgName) - \(.VulnerabilityID)"' backend.json >> summary.md
          echo "" >> summary.md
          echo "### Frontend" >> summary.md
          jq '.Results[].Vulnerabilities[] | select(.Severity=="HIGH" or .Severity=="CRITICAL") | "- \(.Severity) - \(.PkgName) - \(.VulnerabilityID)"' frontend.json >> summary.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('summary.md', 'utf8');
            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body
            });

      # 🚨 Fail if HIGH/CRITICAL found
      - name: Fail on vulnerabilities
        run: |
          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH" or .Severity=="CRITICAL")] | length' backend.json)
          if [ "$HIGH" -gt 0 ]; then
            echo "High or Critical vulnerabilities detected"
            exit 1
          fi

  push:
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    needs: scan

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT_DIR }}
          file: Containerfile.backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT_DIR }}
          file: Containerfile.frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest

