name: Release Backstage
on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io/mozebaltyk
  CONTEXT_DIR: vanilla
  IMAGE_TAG: ${{ github.ref_name }}

jobs:
  # Build Job
  build-and-push:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - name: backstage-backend
            dockerfile: Containerfile.backend
          - name: backstage-frontend
            dockerfile: Containerfile.frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT_DIR }}
          file: ${{ env.CONTEXT_DIR }}/${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

  # Scan job
  Trivy-Scan:
    needs: build-and-push
    runs-on: ubuntu-24.04
    steps:
      - name: Scan ${{ matrix.name }}
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "image"
          image-ref: ${{ env.REGISTRY }}/${{ matrix.name }}:${{ github.ref_name }}
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0

      # Upload SARIF
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif